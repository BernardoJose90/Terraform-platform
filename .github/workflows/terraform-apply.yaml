name: Terraform Apply

# Runs on merge to main. The account list, working directory, deploy role,
# and approval tier are all discovered at runtime from the SSM account
# manifest AND filtered by which account folders actually changed.
# Adding a new account never requires editing this file.
#
# Where possible, this workflow applies the EXACT plan that was reviewed on
# the merged pull request (produced by terraform-plan.yml), rather than
# recomputing a new plan at apply time. This closes the gap where a
# reviewer approves one plan but a different one — computed against
# possibly-drifted state — is what actually gets applied. If no matching
# reviewed plan can be found (e.g. workflow_dispatch, or a direct push to
# main without a PR), it falls back to computing a fresh plan and applying
# that.

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/workflows/**'
      - '**.md'
      - '**.txt'
      - 'docs/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  actions: read

env:
  TERRAFORM_VERSION: "1.10.0"
  AWS_REGION: "eu-west-2"

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # 1. Quick validation before discovery
  # ──────────────────────────────────────────────────────────────────────────────
  quick-validate:
    name: Quick Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Quick Format Check
        run: terraform fmt -check -recursive

  # ──────────────────────────────────────────────────────────────────────────────
  # 2. Security Scan (Checkov) - Commented out
  # ──────────────────────────────────────────────────────────────────────────────
  # security-scan:
  #   name: Security Scan (Checkov)
  #   runs-on: ubuntu-latest
  #   ...

  # ──────────────────────────────────────────────────────────────────────────────
  # 3. Detect which account folders changed
  # ──────────────────────────────────────────────────────────────────────────────
  detect-changes:
    name: Detect Changed Accounts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - quick-validate
    outputs:
      changed_accounts: ${{ steps.filter.outputs.changed_accounts }}
      has_changes: ${{ steps.filter.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed account folders
        id: filter
        run: |
          # Get list of changed files in member-accounts/
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD -- member-accounts/ || echo "")

          if [ -z "$CHANGED_FILES" ]; then
            echo "No changes detected in member-accounts/"
            echo "changed_accounts=" >> "$GITHUB_OUTPUT"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract unique account names from changed paths
          CHANGED_ACCOUNTS=$(echo "$CHANGED_FILES" | \
            grep -E 'member-accounts/[^/]+/' | \
            sed 's|member-accounts/\([^/]*\)/.*|\1|' | \
            sort -u | \
            tr '\n' ',' | \
            sed 's/,$//')

          echo "Changed files: $CHANGED_FILES"
          echo "Changed accounts: $CHANGED_ACCOUNTS"

          echo "changed_accounts=$CHANGED_ACCOUNTS" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────────────────────────
  # 4. Discover accounts from SSM AND filter by changed accounts
  # ──────────────────────────────────────────────────────────────────────────────
  discover-accounts:
    name: Discover & Filter Accounts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      account_count: ${{ steps.build-matrix.outputs.account_count }}
    steps:
      - name: Configure AWS credentials (discovery role — read-only)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.DISCOVERY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-discover-accounts
          retry-max-attempts: 3

      - name: Build matrix from SSM AND filter by changed accounts
        id: build-matrix
        run: |
          CHANGED_ACCOUNTS="${{ needs.detect-changes.outputs.changed_accounts }}"
          echo "Changed accounts: $CHANGED_ACCOUNTS"

          ACCOUNTS=$(aws ssm get-parameters-by-path \
            --path "/organizations/accounts/" \
            --recursive \
            --query "Parameters[*].{Name:Name,Value:Value}" \
            --output json)

          TIERS=$(aws ssm get-parameters-by-path \
            --path "/organizations/tiers/" \
            --recursive \
            --query "Parameters[*].{Name:Name,Value:Value}" \
            --output json)

          MATRIX=$(jq -c -n --argjson accounts "$ACCOUNTS" --argjson tiers "$TIERS" --arg changed "$CHANGED_ACCOUNTS" '
            ($changed | split(",")) as $changed_list |
            ($tiers | map({(.Name | split("/") | last): .Value}) | add) as $tier_map |
            {
              include: [
                $accounts[] |
                select(.Name | split("/") | last != "management") |
                select(.Name | split("/") | last | IN($changed_list[])) |
                {
                  account: (.Name | split("/") | last),
                  working_directory: ("member-accounts/" + (.Name | split("/") | last)),
                  role_arn: ("arn:aws:iam::" + .Value + ":role/TerraformDeploy"),
                  environment: ($tier_map[(.Name | split("/") | last)] // "production-approval"),
                  account_id: .Value
                }
              ]
            }')

          ACCOUNT_COUNT=$(echo "$MATRIX" | jq '.include | length')

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "account_count=$ACCOUNT_COUNT" >> "$GITHUB_OUTPUT"
          echo "Discovered and filtered accounts: $ACCOUNT_COUNT"

      - name: No accounts to apply
        if: steps.build-matrix.outputs.account_count == '0'
        run: |
          echo "⚠️ No accounts match the changed files. Skipping apply."

  # ──────────────────────────────────────────────────────────────────────────────
  # 5. Resolve Plan (download reviewed plan if available)
  # ──────────────────────────────────────────────────────────────────────────────
  resolve-plan-run:
    name: Locate and download reviewed plan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - discover-accounts
    if: needs.discover-accounts.outputs.account_count != '0' && needs.discover-accounts.outputs.account_count != ''
    outputs:
      plan_exists: ${{ steps.check.outputs.plan_exists }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-accounts.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      
      - name: Download plan artifact from previous workflow
        id: download
        uses: dawidd6/action-download-artifact@v2
        continue-on-error: true
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: terraform-plan.yml
          commit: ${{ github.sha }}
          name: tfplan-${{ matrix.account }}
          path: ${{ matrix.working_directory }}
          if_no_artifact_found: warn

      - name: Check if plan was found
        id: check
        run: |
          if [ -f "${{ matrix.working_directory }}/tfplan.binary" ]; then
            echo "plan_exists=true" >> $GITHUB_OUTPUT
            echo "✅ Found reviewed plan for ${{ matrix.account }}"
            ls -la "${{ matrix.working_directory }}/tfplan.binary"
          else
            echo "plan_exists=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No reviewed plan found for ${{ matrix.account }} — will use fresh plan"
          fi

      - name: Upload plan artifact (if found)
        if: steps.check.outputs.plan_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.account }}
          path: ${{ matrix.working_directory }}/tfplan.binary
          retention-days: 5

  # ──────────────────────────────────────────────────────────────────────────────
  # 6. Apply ONLY for changed and discovered accounts
  # ──────────────────────────────────────────────────────────────────────────────
  apply:
    name: Terraform Apply - ${{ matrix.account }}
    needs:
      - discover-accounts
      - resolve-plan-run
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: needs.discover-accounts.outputs.account_count != '0' && needs.discover-accounts.outputs.account_count != ''
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJson(needs.discover-accounts.outputs.matrix) }}

    environment: ${{ matrix.environment }}

    concurrency:
      group: tf-apply-${{ matrix.account }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials (${{ matrix.account }})
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ matrix.role_arn }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-apply-${{ matrix.account }}
          retry-max-attempts: 3

      - name: Terraform Init
        working-directory: ${{ matrix.working_directory }}
        run: terraform init -input=false

      - name: Download reviewed plan from resolve job
        if: needs.resolve-plan-run.outputs.plan_exists == 'true'
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ matrix.account }}
          path: ${{ matrix.working_directory }}

      - name: Terraform Apply (reviewed plan)
        if: needs.resolve-plan-run.outputs.plan_exists == 'true'
        working-directory: ${{ matrix.working_directory }}
        run: |
          echo "🚀 Applying the exact plan reviewed on the merged PR for ${{ matrix.account }} (ID: ${{ matrix.account_id }})"
          echo "📂 Working directory: ${{ matrix.working_directory }}"
          echo "🏷️ Environment: ${{ matrix.environment }}"
          echo ""
          terraform apply -input=false -lock-timeout=120s tfplan.binary 2>&1 | tee apply_output.txt

      - name: Terraform Apply (fresh plan — fallback)
        if: needs.resolve-plan-run.outputs.plan_exists != 'true'
        working-directory: ${{ matrix.working_directory }}
        run: |
          echo "⚠️ No reviewed plan found for ${{ matrix.account }} (this run wasn't triggered by a merged PR)."
          echo "🚀 Computing a fresh plan and applying it for ${{ matrix.account }} (ID: ${{ matrix.account_id }})"
          echo "📂 Working directory: ${{ matrix.working_directory }}"
          echo "🏷️ Environment: ${{ matrix.environment }}"
          echo ""
          terraform plan -no-color -input=false -lock-timeout=60s -out=tfplan.binary
          terraform apply -input=false -lock-timeout=120s tfplan.binary 2>&1 | tee apply_output.txt

      - name: Report apply outcome
        working-directory: ${{ matrix.working_directory }}
        run: |
          echo ""
          echo "─────────────────────────────────────────────────────────────"
          echo "✅ Apply completed for ${{ matrix.account }}"
          echo "─────────────────────────────────────────────────────────────"

          if grep -q "No changes" apply_output.txt; then
            echo "ℹ️ No changes were applied (infrastructure already up to date)"
          else
            echo "📝 Changes applied successfully"
          fi

      - name: Apply Success Notification
        if: success()
        working-directory: ${{ matrix.working_directory }}
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "✅ SUCCESS: ${{ matrix.account }}"
          echo "════════════════════════════════════════════════════════════"
          echo ""
          echo "📋 Summary:"
          echo "  Account: ${{ matrix.account }}"
          echo "  Account ID: ${{ matrix.account_id }}"
          echo "  Environment: ${{ matrix.environment }}"
          echo "  Region: ${{ env.AWS_REGION }}"


      - name: Apply Failure Notification
        if: failure()
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "❌ FAILED: ${{ matrix.account }}"
          echo "════════════════════════════════════════════════════════════"

      - name: Upload apply artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apply-${{ matrix.account }}
          path: ${{ matrix.working_directory }}/apply_output.txt
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────────
  # 7. Summary
  # ──────────────────────────────────────────────────────────────────────────────
  summary:
    name: Apply Summary
    needs:
      - discover-accounts
      - apply
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Print Summary
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "🚀 APPLY SUMMARY"
          echo "════════════════════════════════════════════════════════════"
          echo ""
          echo "Accounts applied: ${{ needs.discover-accounts.outputs.account_count }}"
          echo ""
          echo "Matrix:"
          echo '${{ needs.discover-accounts.outputs.matrix }}' | jq '.include[] | {account: .account, environment: .environment}'
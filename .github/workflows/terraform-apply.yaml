name: Terraform Apply

# Runs on merge to main. The account list, working directory, deploy role,
# and approval tier are all discovered at runtime from the SSM account
# manifest — adding a new account never requires editing this file.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  security-events: write

env:
  TERRAFORM_VERSION: "1.10.0"
  AWS_REGION: "eu-west-2"

jobs:
  validate-format:
    name: Validate & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: |
          terraform fmt -check -recursive
        continue-on-error: false

      - name: Terraform Validate (all accounts)
        run: |
          for dir in member-accounts/*/; do
            echo "Validating $dir..."
            cd $dir
            terraform init -backend=false
            terraform validate
            cd ../..
          done

  security-scan:
    name: Security Scan (Checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkov Security Scan - All Accounts
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: member-accounts/
          framework: terraform
          output_format: cli,sarif
          download_external_modules: true
          quiet: false
          soft_fail: false

      - name: Upload Checkov SARIF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-report
          path: checkov-report.sarif
          retention-days: 7

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-report.sarif
          category: checkov

  discover-accounts:
    name: Discover Accounts
    runs-on: ubuntu-latest
    needs: 
      - validate-format
      - security-scan
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
      - name: Configure AWS credentials (discovery role — read-only)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.DISCOVERY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-discover-accounts
          retry-max-attempts: 3

      - name: Build matrix from SSM account manifest
        id: build-matrix
        run: |
          ACCOUNTS=$(aws ssm get-parameters-by-path \
            --path "/organizations/accounts/" \
            --recursive \
            --query "Parameters[*].{Name:Name,Value:Value}" \
            --output json)
            
          TIERS=$(aws ssm get-parameters-by-path \
            --path "/organizations/tiers/" \
            --recursive \
            --query "Parameters[*].{Name:Name,Value:Value}" \
            --output json)

          MATRIX=$(jq -n --argjson accounts "$ACCOUNTS" --argjson tiers "$TIERS" '
            ($tiers | map({(.Name | split("/") | last): .Value}) | add) as $tier_map |
            {
              include: [
                $accounts[] | (.Name | split("/") | last) as $account |
                # SKIP management account - it's managed by Terraform-org repo
                if $account != "management" then
                {
                  account: $account,
                  working_directory: "member-accounts/\($account)",
                  role_arn: "arn:aws:iam::\(.Value):role/TerraformDeploy",
                  environment: ($tier_map[$account] // "production-approval"),
                  account_id: .Value
                }
                else empty end
              ]
            }')

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Discovered accounts: $(echo $MATRIX | jq '.include | length')"

  apply:
    name: Terraform Apply - ${{ matrix.account }}
    needs: 
      - discover-accounts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJson(needs.discover-accounts.outputs.matrix) }}

    environment: ${{ matrix.environment }}

    concurrency:
      group: tf-apply-${{ matrix.account }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials (${{ matrix.account }})
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ matrix.role_arn }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-apply-${{ matrix.account }}
          retry-max-attempts: 3

      - name: Terraform Init
        working-directory: ${{ matrix.working_directory }}
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: ${{ matrix.working_directory }}
        run: terraform validate

      - name: Checkov Security Scan (Account-specific)
        id: checkov_account
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ${{ matrix.working_directory }}
          framework: terraform
          output_format: cli,sarif
          download_external_modules: true
          quiet: false
          soft_fail: false

      - name: Upload Checkov SARIF (Account-specific)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-report-${{ matrix.account }}
          path: checkov-report.sarif
          retention-days: 7

      - name: Upload SARIF to GitHub Security tab (Account-specific)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-report.sarif
          category: checkov-${{ matrix.account }}

      - name: Terraform Apply
        id: apply
        working-directory: ${{ matrix.working_directory }}
        run: |
          echo "🚀 Applying to ${{ matrix.account }} (ID: ${{ matrix.account_id }})"
          terraform apply -auto-approve -input=false -lock-timeout=120s
        continue-on-error: false

      - name: Apply Success Notification
        if: success()
        working-directory: ${{ matrix.working_directory }}
        run: |
          echo "✅ Successfully applied to ${{ matrix.account }}"
          echo ""
          echo "📋 Summary:"
          echo "  Account: ${{ matrix.account }}"
          echo "  Account ID: ${{ matrix.account_id }}"
          echo "  Environment: ${{ matrix.environment }}"
          echo "  Region: ${{ env.AWS_REGION }}"
          echo ""
          echo "🔍 Verify resources:"
          echo "  aws iam get-role --role-name TerraformDeploy --profile ${{ matrix.account }}"
          echo "  aws ec2 describe-vpcs --filters Name=tag:Name,Values=${{ matrix.account }}-vpc --region ${{ env.AWS_REGION }}"

      - name: Apply Failure Notification
        if: failure()
        run: |
          echo "❌ Failed to apply to ${{ matrix.account }}"
          echo ""
          echo "🔧 Troubleshooting:"
          echo "  1. Check the logs above for specific errors"
          echo "  2. Verify the role exists: ${{ matrix.role_arn }}"
          echo "  3. Check S3 bucket permissions for state file access"
          echo "  4. Verify SSM parameters: /organizations/accounts/${{ matrix.account }}"
          exit 1

      - name: Upload apply artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apply-${{ matrix.account }}
          path: ${{ matrix.working_directory }}
          retention-days: 7

  apply-summary:
    name: Apply Summary
    needs: apply
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary of all applies
        run: |
          echo "══════════════════════════════════════════════════════════"
          echo "📋 Terraform Apply Summary"
          echo "═══════════════════════════════════════════════════════════"
          echo ""
          
          # Count successes and failures
          SUCCESS_COUNT=0
          FAILURE_COUNT=0
          
          for result in ${{ toJson(needs.apply.result) }}; do
            if [ "$result" == "success" ]; then
              ((SUCCESS_COUNT++))
            else
              ((FAILURE_COUNT++))
            fi
          done
          
          echo "✅ Successful: ${SUCCESS_COUNT}"
          echo "❌ Failed: ${FAILURE_COUNT}"
          echo ""
          
          if [ $FAILURE_COUNT -gt 0 ]; then
            echo "⚠️ Some accounts failed to apply. Please check the logs."
            exit 1
          else
            echo "🎉 All accounts applied successfully!"
          fi
name: Terraform Apply

# Runs on merge to main. The account list, working directory, deploy role,
# and approval tier are all discovered at runtime from the SSM account
# manifest — adding a new account never requires editing this file.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  security-events: write

env:
  TERRAFORM_VERSION: "1.10.0"
  AWS_REGION: "eu-west-2"

jobs:
  # Quick validation before discovery
  quick-validate:
    name: Quick Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Quick Format Check
        run: terraform fmt -check -recursive

      - name: Quick Validate
        run: |
          for dir in member-accounts/*/; do
            echo "Validating $dir..."
            cd $dir
            terraform init -backend=false
            terraform validate
            cd ../..
          done

  # ⚠️ COMMENTED OUT - Checkov Security Scan
  # Will be enabled after fixing IAM and VPC policies
  # security-scan:
  #   name: Security Scan (Checkov)
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #
  #     - name: Checkov Security Scan - All Accounts
  #       id: checkov
  #       uses: bridgecrewio/checkov-action@master
  #       with:
  #         directory: member-accounts/
  #         framework: terraform
  #         output_format: cli,sarif
  #         download_external_modules: true
  #         quiet: false
  #         soft_fail: false
  #
  #     - name: Upload Checkov SARIF report
  #       if: always()
  #       uses: actions/upload-artifact@v4
  #       with:
  #         name: checkov-report
  #         path: results.sarif
  #         retention-days: 7
  #
  #     - name: Upload SARIF to GitHub Security tab
  #       if: always()
  #       uses: github/codeql-action/upload-sarif@v3
  #       with:
  #         sarif_file: results.sarif
  #         category: checkov

  discover-accounts:
    name: Discover Accounts
    runs-on: ubuntu-latest
    needs: 
      - quick-validate
      # - security-scan  # ⚠️ COMMENTED OUT - remove when enabling security scan
      
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
      - name: Configure AWS credentials (discovery role — read-only)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.DISCOVERY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-discover-accounts
          retry-max-attempts: 3

      - name: Build matrix from SSM account manifest
        id: build-matrix
        run: |
          ACCOUNTS=$(aws ssm get-parameters-by-path \
            --path "/organizations/accounts/" \
            --recursive \
            --query "Parameters[*].{Name:Name,Value:Value}" \
            --output json)
            
          TIERS=$(aws ssm get-parameters-by-path \
            --path "/organizations/tiers/" \
            --recursive \
            --query "Parameters[*].{Name:Name,Value:Value}" \
            --output json)

          MATRIX=$(jq -c -n --argjson accounts "$ACCOUNTS" --argjson tiers "$TIERS" '
            ($tiers | map({(.Name | split("/") | last): .Value}) | add) as $tier_map |
            {
              include: [
                $accounts[] | 
                select(.Name | split("/") | last != "management") |
                {
                  account: (.Name | split("/") | last),
                  working_directory: ("member-accounts/" + (.Name | split("/") | last)),
                  role_arn: ("arn:aws:iam::" + .Value + ":role/TerraformDeploy"),
                  environment: ($tier_map[(.Name | split("/") | last)] // "production-approval"),
                  account_id: .Value
                }
              ]
            }')

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Discovered accounts: $(echo $MATRIX | jq '.include | length')"

  apply:
    name: Terraform Apply - ${{ matrix.account }}
    needs: 
      - discover-accounts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJson(needs.discover-accounts.outputs.matrix) }}

    environment: ${{ matrix.environment }}

    concurrency:
      group: tf-apply-${{ matrix.account }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials (${{ matrix.account }})
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ matrix.role_arn }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-apply-${{ matrix.account }}
          retry-max-attempts: 3

      - name: Terraform Init
        working-directory: ${{ matrix.working_directory }}
        run: terraform init -input=false

        
      # ⚠️ COMMENTED OUT - Account-specific Checkov scan
      # Will be enabled after fixing IAM and VPC policies
      # - name: Checkov Security Scan (Account-specific)
      #   id: checkov_account
      #   uses: bridgecrewio/checkov-action@master
      #   with:
      #     directory: ${{ matrix.working_directory }}
      #     framework: terraform
      #     output_format: cli,sarif
      #     download_external_modules: true
      #     quiet: false
      #     soft_fail: false
      #
      # - name: Upload Checkov SARIF (Account-specific)
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: checkov-report-${{ matrix.account }}
      #     path: results.sarif
      #     retention-days: 7
      #
      # - name: Upload SARIF to GitHub Security tab (Account-specific)
      #   if: always()
      #   uses: github/codeql-action/upload-sarif@v3
      #   with:
      #     sarif_file: results.sarif
      #     category: checkov-${{ matrix.account }}

      - name: Terraform Apply
        id: apply
        working-directory: ${{ matrix.working_directory }}
        run: |
          echo "🚀 Applying to ${{ matrix.account }} (ID: ${{ matrix.account_id }})"
          echo "📂 Working directory: ${{ matrix.working_directory }}"
          echo ""
          terraform apply -auto-approve -input=false -lock-timeout=120s 2>&1 | tee apply_output.txt
          
          echo ""
          echo "─────────────────────────────────────────────────────────────"
          echo "✅ Apply completed for ${{ matrix.account }}"
          echo "─────────────────────────────────────────────────────────────"
          
          # Check for changes
          if grep -q "No changes" apply_output.txt; then
            echo "ℹ️ No changes were applied (infrastructure already up to date)"
          else
            echo "📝 Changes applied successfully"
          fi

      - name: Apply Success Notification
        if: success()
        working-directory: ${{ matrix.working_directory }}
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "✅ SUCCESS: ${{ matrix.account }}"
          echo "════════════════════════════════════════════════════════════"
          echo ""
          echo "📋 Summary:"
          echo "  Account: ${{ matrix.account }}"
          echo "  Account ID: ${{ matrix.account_id }}"
          echo "  Environment: ${{ matrix.environment }}"
          echo "  Region: ${{ env.AWS_REGION }}"
          echo ""
          echo "🔍 Verify resources:"
          echo "  aws iam get-role --role-name TerraformDeploy --profile ${{ matrix.account }}"
          echo "  aws ec2 describe-vpcs --filters Name=tag:Name,Values=${{ matrix.account }}-vpc --region ${{ env.AWS_REGION }}"

      - name: Apply Failure Notification
        if: failure()
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "❌ FAILED: ${{ matrix.account }}"
          echo "════════════════════════════════════════════════════════════"
          echo ""
          echo "🔧 Troubleshooting:"
          echo "  1. Check the logs above for specific errors"
          echo "  2. Verify the role exists: ${{ matrix.role_arn }}"
          echo "  3. Check S3 bucket permissions for state file access"
          echo "  4. Verify SSM parameters: /organizations/accounts/${{ matrix.account }}"
          echo "  5. Check if there are manual changes in the state"
          echo ""
          echo "💡 Common fixes:"
          echo "  - Run 'terraform plan' locally in ${{ matrix.working_directory }}"
          echo "  - Check for resource conflicts or missing dependencies"
          echo "  - Verify provider configuration"

      - name: Upload apply artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apply-${{ matrix.account }}
          path: ${{ matrix.working_directory }}
          retention-days: 7

  apply-summary:
    name: Apply Summary
    needs: apply
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary of all applies
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "📋 Terraform Apply Summary"
          echo "════════════════════════════════════════════════════════════"
          echo ""
          echo "📊 Results:"
          echo "${{ toJson(needs.apply.result) }}"
          echo ""
          
          SUCCESS_COUNT=0
          FAILURE_COUNT=0
          
          for result in ${{ toJson(needs.apply.result) }}; do
            if [ "$result" == "success" ]; then
              ((SUCCESS_COUNT++))
            else
              ((FAILURE_COUNT++))
            fi
          done
          
          echo "✅ Successful: ${SUCCESS_COUNT}"
          echo "❌ Failed: ${FAILURE_COUNT}"
          echo ""
          
          echo "════════════════════════════════════════════════════════════"
          echo ""
          
          if [ $FAILURE_COUNT -gt 0 ]; then
            echo "⚠️ Some accounts failed to apply. Please check the logs."
            echo ""
            echo "🔧 Next steps:"
            echo "  1. Review the failed job logs above"
            echo "  2. Fix the issues in your Terraform code"
            echo "  3. Open a PR with fixes"
            echo "  4. Merge again to retry apply"
            exit 1
          else
            echo "🎉 All accounts applied successfully!"
            echo ""
            echo "✅ Infrastructure is now up to date for all accounts."
          fi


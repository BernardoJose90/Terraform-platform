name: Terraform Plan

# Runs on every pull request (PR) touching main. Never applies anything — read-only.
# The account list is discovered at runtime from SSM, AND filtered by which
# account folders actually changed. Adding a new account never requires editing
# this file — just create the folder and add the SSM parameter.
#
# The saved binary plan file (tfplan.binary) produced here is uploaded as an
# artifact per account and reused verbatim by the Apply workflow after merge,
# so what gets reviewed on the PR is exactly what gets applied — not a
# freshly recomputed plan that could differ if state changed in between.

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '.github/workflows/**'
      - '.gitignore**'
      - '**.md'
      - '**.txt'
      - 'docs/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pull-requests: write
  security-events: write   # required for Checkov's SARIF upload to GitHub Security tab

concurrency:
  group: tf-plan-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  TERRAFORM_VERSION: "1.10.0"
  AWS_REGION: "eu-west-2"

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # 1. Validate & Format
  # ──────────────────────────────────────────────────────────────────────────────
  validate-format:
    name: Validate & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Format
        id: fmt
        run: |
          terraform fmt -recursive
          if [ -n "$(git status --porcelain)" ]; then
            echo "Formatting applied - committing changes"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "style: auto-format Terraform files"
            git push
          fi

      - name: Terraform Validate (all accounts)
        run: |
          for dir in member-accounts/*/; do
            echo "Validating $dir..."
            cd $dir
            terraform init -backend=false
            terraform validate
            cd ../..
          done

  # ──────────────────────────────────────────────────────────────────────────────
  # 2. Security Scan (Checkov)
  # ──────────────────────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan (Checkov)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Checkov Security Scan - All Accounts
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: member-accounts/
          framework: terraform
          output_format: cli,sarif
          download_external_modules: true
          quiet: false
          soft_fail: true

      - name: Upload Checkov SARIF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-report
          path: results.sarif
          retention-days: 7

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: checkov

  # ──────────────────────────────────────────────────────────────────────────────
  # 3. Detect which account folders changed
  # ──────────────────────────────────────────────────────────────────────────────
  detect-changes:
    name: Detect Changed Accounts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - validate-format
    outputs:
      changed_accounts: ${{ steps.filter.outputs.changed_accounts }}
      has_changes: ${{ steps.filter.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed account folders
        id: filter
        run: |
          # Get list of changed files in member-accounts/ compared to base branch
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD -- member-accounts/ || echo "")

          if [ -z "$CHANGED_FILES" ]; then
            echo "No changes detected in member-accounts/"
            echo "changed_accounts=" >> "$GITHUB_OUTPUT"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract unique account names from changed paths
          # e.g., member-accounts/production/main.tf → production
          CHANGED_ACCOUNTS=$(echo "$CHANGED_FILES" | \
            grep -E 'member-accounts/[^/]+/' | \
            sed 's|member-accounts/\([^/]*\)/.*|\1|' | \
            sort -u | \
            tr '\n' ',' | \
            sed 's/,$//')

          echo "Changed files: $CHANGED_FILES"
          echo "Changed accounts: $CHANGED_ACCOUNTS"

          echo "changed_accounts=$CHANGED_ACCOUNTS" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────────────────────────
  # 4. Discover accounts from SSM AND filter by changed accounts
  # ──────────────────────────────────────────────────────────────────────────────
  discover-accounts:
    name: Discover & Filter Accounts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - detect-changes
    # Only run if there are actual changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      account_count: ${{ steps.build-matrix.outputs.account_count }}
    steps:
      - name: Configure AWS credentials (discovery role — read-only)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.DISCOVERY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-discover-accounts
          retry-max-attempts: 3

      - name: Build matrix from SSM AND filter by changed accounts
        id: build-matrix
        run: |
          # Get changed accounts from previous job
          CHANGED_ACCOUNTS="${{ needs.detect-changes.outputs.changed_accounts }}"
          echo "Changed accounts: $CHANGED_ACCOUNTS"

          # Get all accounts from SSM
          ACCOUNTS=$(aws ssm get-parameters-by-path \
            --path "/organizations/accounts/" \
            --recursive \
            --query "Parameters[*].{Name:Name,Value:Value}" \
            --output json)

          # Get tiers from SSM
          TIERS=$(aws ssm get-parameters-by-path \
            --path "/organizations/tiers/" \
            --recursive \
            --query "Parameters[*].{Name:Name,Value:Value}" \
            --output json)

          # Build matrix filtered by changed accounts AND SSM discovery
          MATRIX=$(jq -c -n --argjson accounts "$ACCOUNTS" --argjson tiers "$TIERS" --arg changed "$CHANGED_ACCOUNTS" '
            ($changed | split(",")) as $changed_list |
            ($tiers | map({(.Name | split("/") | last): .Value}) | add) as $tier_map |
            {
              include: [
                $accounts[] |
                select(.Name | split("/") | last != "management") |
                select(.Name | split("/") | last | IN($changed_list[])) |
                {
                  account: (.Name | split("/") | last),
                  working_directory: ("member-accounts/" + (.Name | split("/") | last)),
                  role_arn: ("arn:aws:iam::" + .Value + ":role/TerraformPlan"),
                  environment: ($tier_map[(.Name | split("/") | last)] // "production-approval"),
                  account_id: .Value
                }
              ]
            }')

          ACCOUNT_COUNT=$(echo "$MATRIX" | jq '.include | length')

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "account_count=$ACCOUNT_COUNT" >> "$GITHUB_OUTPUT"
          echo "Discovered and filtered accounts: $ACCOUNT_COUNT"

          if [ "$ACCOUNT_COUNT" -eq 0 ]; then
            echo "⚠️ No matching accounts found for changed folders"
          fi

      - name: No accounts to plan
        if: steps.build-matrix.outputs.account_count == '0'
        run: |
          echo "⚠️ No accounts match the changed files. Skipping plan."
          echo "Changed files may be in shared modules or non-account directories."

  # ──────────────────────────────────────────────────────────────────────────────
  # 5. Plan ONLY for changed and discovered accounts
  # ──────────────────────────────────────────────────────────────────────────────
  plan:
    name: Terraform Plan - ${{ matrix.account }}
    needs:
      - discover-accounts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only run if we have accounts to plan
    if: needs.discover-accounts.outputs.account_count != '0' && needs.discover-accounts.outputs.account_count != ''
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-accounts.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials (${{ matrix.account }})
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ matrix.role_arn }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-plan-${{ matrix.account }}
          retry-max-attempts: 3

      - name: Terraform Init
        working-directory: ${{ matrix.working_directory }}
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: ${{ matrix.working_directory }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ matrix.working_directory }}
        continue-on-error: true
        run: |
          echo "📋 Planning for ${{ matrix.account }} (ID: ${{ matrix.account_id }})"
          echo "Working directory: ${{ matrix.working_directory }}"
          echo "Environment: ${{ matrix.environment }}"
          echo ""

          terraform plan -no-color -input=false -lock-timeout=60s -out=tfplan.binary 2>&1 | tee plan_output.txt
          exit_code=${PIPESTATUS[0]}
          echo "plan_exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          echo ""
          echo "─────────────────────────────────────────────────────────────"
          echo "📝 Plan exit code: $exit_code"
          echo "─────────────────────────────────────────────────────────────"
          if [ $exit_code -ne 0 ]; then
            echo "❌ Terraform plan FAILED with exit code: $exit_code"
            echo ""
            echo "🔍 Full error output:"
            echo "─────────────────────────────────────────────────────────────"
            tail -50 plan_output.txt
            echo "─────────────────────────────────────────────────────────────"
          else
            echo "✅ Terraform plan SUCCEEDED"
          fi

      - name: Check Plan Exit Code
        if: steps.plan.outputs.plan_exit_code != '0'
        run: |
          echo "❌ Terraform plan failed for ${{ matrix.account }}"
          echo ""
          echo "🔧 To fix this issue:"
          echo "  1. Run 'terraform plan' locally in ${{ matrix.working_directory }}"
          echo "  2. Check the detailed error output in the logs above"
          echo "  3. Verify SSM parameters and provider configuration"
          exit 1

      - name: Post plan as PR comment (Success)
        if: steps.plan.outputs.plan_exit_code == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = `${{ matrix.working_directory }}/plan_output.txt`;
            let output = '(no output captured)';
            try {
              output = fs.readFileSync(path, 'utf8');
            } catch (e) {}

            const fullLogLink = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            if (output.length > 60000) {
              output = output.slice(0, 60000) + `\n... (truncated, [view full logs](${fullLogLink}))`;
            }

            const hasChanges = !output.includes("No changes") && !output.includes("0 to add, 0 to change, 0 to destroy");
            const statusIcon = hasChanges ? '📝' : '✅';

            const marker = `<!-- terraform-plan-account:${{ matrix.account }} -->`;
            const body = `${marker}\n### ${statusIcon} Terraform Plan — \`${{ matrix.account }}\` (ID: ${{ matrix.account_id }})\n\n<details><summary>Show plan output</summary>\n\n\`\`\`\n${output}\n\`\`\`\n</details>\n\n**Environment:** \`${{ matrix.environment }}\``;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload plan log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plan-${{ matrix.account }}
          path: ${{ matrix.working_directory }}/plan_output.txt
          retention-days: 7

      - name: Upload plan file for apply reuse
        if: steps.plan.outputs.plan_exit_code == '0'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.account }}
          path: ${{ matrix.working_directory }}/tfplan.binary
          retention-days: 5

  # ──────────────────────────────────────────────────────────────────────────────
  # 6. Cost Estimation (Infracost - Free Tier, No API Key)
  # ──────────────────────────────────────────────────────────────────────────────
  infracost:
    name: Cost Estimation - ${{ matrix.account }}
    needs:
      - discover-accounts
      - plan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only run on PRs when we have accounts to estimate
    if: |
      github.event_name == 'pull_request' &&
      needs.discover-accounts.outputs.account_count != '0' &&
      needs.discover-accounts.outputs.account_count != ''
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-accounts.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - name: Download Terraform plan artifact from plan job
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ matrix.account }}
          path: ${{ matrix.working_directory }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials (${{ matrix.account }})
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ matrix.role_arn }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-infracost-${{ matrix.account }}
          retry-max-attempts: 3

      - name: Terraform Init
        working-directory: ${{ matrix.working_directory }}
        run: terraform init -input=false

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          # Free tier works without an API key, but the action requires this parameter
          # Pass an empty string for free tier usage
          api-key: ''
          version: latest

      - name: Verify Infracost installation
        run: |
          echo "✅ Infracost installed successfully"
          infracost --version

      - name: Verify plan file exists
        working-directory: ${{ matrix.working_directory }}
        run: |
          echo "Checking for plan file..."
          ls -la tfplan.binary || echo "⚠️ Plan file not found!"
          if [ -f tfplan.binary ]; then
            echo "✅ Plan file exists"
            echo "File size: $(du -h tfplan.binary | cut -f1)"
          else
            echo "❌ Plan file not found!"
            exit 1
          fi

      - name: Run Infracost using plan file
        id: infracost
        working-directory: ${{ matrix.working_directory }}
        continue-on-error: true
        run: |
          echo "💰 Generating cost estimate for ${{ matrix.account }} (Free Tier)..."
          echo ""
          
          # Use the plan binary file directly
          infracost breakdown --path tfplan.binary \
            --format table \
            --output cost_output.txt 2>&1

          # Check if output was generated
          if [ -f cost_output.txt ] && [ -s cost_output.txt ]; then
            echo "✅ Cost estimate generated successfully"
            echo "cost_generated=true" >> $GITHUB_OUTPUT
            cat cost_output.txt
            
            # Convert table to markdown for PR comment
            echo "## 💰 Cost Estimate — \`${{ matrix.account }}\` (Free Tier)" > infracost_output.md
            echo "" >> infracost_output.md
            echo "\`\`\`" >> infracost_output.md
            cat cost_output.txt >> infracost_output.md
            echo "\`\`\`" >> infracost_output.md
            echo "" >> infracost_output.md
            echo "> ℹ️ *Free tier estimate — no API key required. For detailed HTML reports and historical tracking, sign up at [infracost.io](https://www.infracost.io).*" >> infracost_output.md
          else
            echo "⚠️ No cost estimate generated" 
            echo "cost_generated=false" >> $GITHUB_OUTPUT
            
            # Check if plan file has resources that Infracost can process
            echo "🔍 Checking plan file contents..."
            infracost breakdown --path tfplan.binary --format json --output cost_debug.json 2>&1 || true
            
            if [ -f cost_debug.json ]; then
              RESOURCE_COUNT=$(jq '.resources | length' cost_debug.json 2>/dev/null || echo "0")
              echo "Resources found in plan: $RESOURCE_COUNT"
            fi
            
            cat > infracost_output.md << EOF
            ## ⚠️ Cost Estimate — \`${{ matrix.account }}\` (Free Tier)
            
            No cost estimate could be generated for this account.
            
            **Possible reasons:**
            - No billable resources were found in the Terraform plan
            - The plan file may be corrupted or invalid
            - Infracost may not support the resources being used
            
            **Debug information:**
            - Plan file exists: \`$(test -f tfplan.binary && echo "Yes" || echo "No")\`
            - Plan file size: \`$(du -h tfplan.binary 2>/dev/null | cut -f1 || echo "N/A")\`
            
            > 💡 For more detailed cost estimation, consider signing up for Infracost Cloud at [infracost.io](https://www.infracost.io)
            EOF
          fi

      - name: Post Infracost comment to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = `${{ matrix.working_directory }}/infracost_output.md`;
            let output = '⚠️ No cost estimate available.';
            try {
              if (fs.existsSync(path)) {
                output = fs.readFileSync(path, 'utf8');
              }
            } catch (e) {
              output = `⚠️ Error reading cost estimate: ${e.message}`;
            }

            // Truncate if too long
            if (output.length > 60000) {
              output = output.slice(0, 60000) + '\n... (truncated)';
            }

            const marker = `<!-- infracost-account:${{ matrix.account }} -->`;
            const body = `${marker}\n${output}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload cost report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cost-report-${{ matrix.account }}
          path: ${{ matrix.working_directory }}/infracost_output.md
          retention-days: 7
          if-no-files-found: warn

      - name: Upload Infracost debug JSON
        if: failure() || steps.infracost.outputs.cost_generated == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: infracost-debug-${{ matrix.account }}
          path: ${{ matrix.working_directory }}/cost_debug.json
          retention-days: 3
          if-no-files-found: ignore

  # ──────────────────────────────────────────────────────────────────────────────
  # 7. Summary
  # ──────────────────────────────────────────────────────────────────────────────
  summary:
    name: Plan Summary
    needs:
      - discover-accounts
      - plan
      - infracost
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Print Summary
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "✅ PLAN SUMMARY"
          echo "════════════════════════════════════════════════════════════"
          echo ""
          echo "Accounts planned: ${{ needs.discover-accounts.outputs.account_count }}"
          echo ""
          echo "Matrix:"
          echo '${{ needs.discover-accounts.outputs.matrix }}' | jq '.include[] | {account: .account, environment: .environment}'
          echo ""
          echo "════════════════════════════════════════════════════════════"
          echo "📊 Infracost Status:"
          echo "  - Free tier (no API key required)"
          echo "  - Cost estimates posted as PR comments"
          echo "  - Reports saved as artifacts"
          echo "════════════════════════════════════════════════════════════"
          
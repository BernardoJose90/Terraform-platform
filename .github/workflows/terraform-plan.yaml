name: Terraform Plan

# Runs on every PR touching main. Never applies anything — read-only.
# The account list is discovered at runtime from SSM, not hardcoded here —
# adding a new account never requires editing this file.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: write  # ✅ Changed from 'read' to 'write' for auto-commit
  pull-requests: write
  security-events: write

concurrency:
  group: tf-plan-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  TERRAFORM_VERSION: "1.10.0"
  AWS_REGION: "eu-west-2"

jobs:
  validate-format:
    name: Validate & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}  # ✅ Checkout the PR branch
          fetch-depth: 0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Format
        id: fmt
        run: |
          terraform fmt -recursive
          if [ -n "$(git status --porcelain)" ]; then
            echo "Formatting applied - committing changes"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "style: auto-format Terraform files"
            git push
          fi

      - name: Terraform Validate (all accounts)
        run: |
          for dir in member-accounts/*/; do
            echo "Validating $dir..."
            cd $dir
            terraform init -backend=false
            terraform validate
            cd ../..
          done

  # ⚠️ COMMENTED OUT - Checkov Security Scan
  # Will be enabled after fixing IAM and VPC policies
  # security-scan:
  #   name: Security Scan (Checkov)
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #
  #     - name: Checkov Security Scan - All Accounts
  #       id: checkov
  #       uses: bridgecrewio/checkov-action@master
  #       with:
  #         directory: member-accounts/
  #         framework: terraform
  #         output_format: cli,sarif
  #         download_external_modules: true
  #         quiet: false
  #         soft_fail: false
  #
  #     - name: Upload Checkov SARIF report
  #       if: always()
  #       uses: actions/upload-artifact@v4
  #       with:
  #         name: checkov-report
  #         path: results.sarif
  #         retention-days: 7
  #
  #     - name: Upload SARIF to GitHub Security tab
  #       if: always()
  #       uses: github/codeql-action/upload-sarif@v3
  #       with:
  #         sarif_file: results.sarif
  #         category: checkov

  discover-accounts:
    name: Discover Accounts
    runs-on: ubuntu-latest
    needs: 
      - validate-format
      # - security-scan  # ⚠️ COMMENTED OUT - remove dependency
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
      - name: Configure AWS credentials (discovery role — read-only)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.DISCOVERY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-discover-accounts
          retry-max-attempts: 3

      - name: Build matrix from SSM account manifest
        id: build-matrix
        run: |
          ACCOUNTS=$(aws ssm get-parameters-by-path \
            --path "/organizations/accounts/" \
            --recursive \
            --query "Parameters[*].{Name:Name,Value:Value}" \
            --output json)

          TIERS=$(aws ssm get-parameters-by-path \
            --path "/organizations/tiers/" \
            --recursive \
            --query "Parameters[*].{Name:Name,Value:Value}" \
            --output json)
            
          # ✅ FIXED - Use jq -c for compact single-line JSON output
          MATRIX=$(jq -c -n --argjson accounts "$ACCOUNTS" --argjson tiers "$TIERS" '
            ($tiers | map({(.Name | split("/") | last): .Value}) | add) as $tier_map |
            {
              include: [
                $accounts[] | 
                select(.Name | split("/") | last != "management") |
                {
                  account: (.Name | split("/") | last),
                  working_directory: ("member-accounts/" + (.Name | split("/") | last)),
                  role_arn: ("arn:aws:iam::" + .Value + ":role/TerraformPlan"),
                  environment: ($tier_map[(.Name | split("/") | last)] // "production-approval"),
                  account_id: .Value
                }
              ]
            }')

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Discovered accounts: $(echo $MATRIX | jq '.include | length')"

  plan:
    name: Terraform Plan - ${{ matrix.account }}
    needs: 
      - discover-accounts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-accounts.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials (${{ matrix.account }})
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ matrix.role_arn }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-plan-${{ matrix.account }}
          retry-max-attempts: 3

      - name: Terraform Init
        working-directory: ${{ matrix.working_directory }}
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: ${{ matrix.working_directory }}
        run: terraform validate

      # ⚠️ COMMENTED OUT - Account-specific Checkov scan
      # Will be enabled after fixing IAM and VPC policies
      # - name: Checkov Security Scan (Account-specific)
      #   id: checkov_account
      #   uses: bridgecrewio/checkov-action@master
      #   with:
      #     directory: ${{ matrix.working_directory }}
      #     framework: terraform
      #     output_format: cli,sarif
      #     download_external_modules: true
      #     quiet: false
      #     soft_fail: false
      #
      # - name: Upload Checkov SARIF (Account-specific)
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: checkov-report-${{ matrix.account }}
      #     path: results.sarif
      #     retention-days: 7
      #
      # - name: Upload SARIF to GitHub Security tab (Account-specific)
      #   if: always()
      #   uses: github/codeql-action/upload-sarif@v3
      #   with:
      #     sarif_file: results.sarif
      #     category: checkov-${{ matrix.account }}

      - name: Terraform Plan
        id: plan
        working-directory: ${{ matrix.working_directory }}
        continue-on-error: true
        run: |
          echo "📋 Planning for ${{ matrix.account }} (ID: ${{ matrix.account_id }})"
          echo "Working directory: ${{ matrix.working_directory }}"
          echo ""
          terraform plan -no-color -input=false -lock-timeout=60s 2>&1 | tee plan_output.txt
          exit_code=${PIPESTATUS[0]}
          echo "plan_exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          echo ""
          echo "─────────────────────────────────────────────────────────────"
          echo "📝 Plan exit code: $exit_code"
          echo "─────────────────────────────────────────────────────────────"
          if [ $exit_code -ne 0 ]; then
            echo "❌ Terraform plan FAILED with exit code: $exit_code"
            echo ""
            echo "🔍 Full error output:"
            echo "─────────────────────────────────────────────────────────────"
            tail -50 plan_output.txt
            echo "─────────────────────────────────────────────────────────────"
            echo ""
            echo "💡 Troubleshooting:"
            echo "  1. Check SSM parameter: /organizations/accounts/${{ matrix.account }}"
            echo "  2. Verify provider configuration in: ${{ matrix.working_directory }}/main.tf"
            echo "  3. Check if the TerraformPlan role exists in the target account"
            echo "  4. Run 'terraform plan' locally in ${{ matrix.working_directory }}"
          else
            echo "✅ Terraform plan SUCCEEDED"
          fi

      - name: Check Plan Exit Code
        if: steps.plan.outputs.plan_exit_code != '0'
        run: |
          echo "❌ Terraform plan failed for ${{ matrix.account }}"
          echo ""
          echo "🔧 To fix this issue:"
          echo "  1. Run 'terraform plan' locally in ${{ matrix.working_directory }}"
          echo "  2. Check the detailed error output in the logs above"
          echo "  3. Verify SSM parameters and provider configuration"
          exit 1

      - name: Post plan as PR comment (Success)
        if: steps.plan.outputs.plan_exit_code == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = `${{ matrix.working_directory }}/plan_output.txt`;
            let output = '(no output captured)';
            try {
              output = fs.readFileSync(path, 'utf8');
            } catch (e) {}

            const fullLogLink = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            
            if (output.length > 60000) {
              output = output.slice(0, 60000) + `\n... (truncated, [view full logs](${fullLogLink}))`;
            }

            // Check if plan had changes
            const hasChanges = !output.includes("No changes") && !output.includes("0 to add, 0 to change, 0 to destroy");
            const statusIcon = hasChanges ? '📝' : '✅';
            
            const marker = `<!-- terraform-plan-account:${{ matrix.account }} -->`;
            const body = `${marker}\n### ${statusIcon} Terraform Plan — \`${{ matrix.account }}\` (ID: ${{ matrix.account_id }})\n\n<details><summary>Show plan output</summary>\n\n\`\`\`\n${output}\n\`\`\`\n</details>`;
           
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
           
            const existing = comments.find(c => c.body.includes(marker));
            
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload plan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plan-${{ matrix.account }}
          path: ${{ matrix.working_directory }}/plan_output.txt
          retention-days: 7
        
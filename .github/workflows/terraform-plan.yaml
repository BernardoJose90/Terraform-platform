name: Terraform Plan

# Runs on every PR touching main. Never applies anything â€” read-only.
# The account list is discovered at runtime from SSM, not hardcoded here â€”
# adding a new account never requires editing this file.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: tf-plan-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  discover-accounts:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
      - name: Configure AWS credentials (discovery role â€” read-only)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.DISCOVERY_ROLE_ARN }}
          aws-region: eu-west-2
          role-session-name: gha-discover-accounts

      - name: Build matrix from SSM account manifest
        id: build-matrix
        run: |
          ACCOUNTS=$(aws ssm get-parameters-by-path \
            --path "/organizations/accounts/" \
            --recursive \
            --query "Parameters[*].{Name:Name,Value:Value}" \
            --output json)

          TIERS=$(aws ssm get-parameters-by-path \
            --path "/organizations/tiers/" \
            --recursive \
            --query "Parameters[*].{Name:Name,Value:Value}" \
            --output json)
            
          MATRIX=$(jq -n --argjson accounts "$ACCOUNTS" --argjson tiers "$TIERS" '
            ($tiers | map({(.Name | split("/") | last): .Value}) | add) as $tier_map |
            {
              include: [
                $accounts[] | (.Name | split("/") | last) as $account |
                # SKIP management account - it's managed by Terraform-org repo
                if $account != "management" then
                {
                  account: $account,
                  working_directory: "member-accounts/\($account)",
                  role_arn: "arn:aws:iam::\(.Value):role/TerraformPlan",
                  environment: ($tier_map[$account] // "production-approval")
                }
                else empty end
              ]
            }')

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  plan:
    needs: discover-accounts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-accounts.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - name: Configure AWS credentials (${{ matrix.account }})
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ matrix.role_arn }}
          aws-region: eu-west-2
          role-session-name: gha-plan-${{ matrix.account }}

      - name: Terraform Init
        working-directory: ${{ matrix.working_directory }}
        run: terraform init -input=false

      - name: Terraform Plan
        id: plan
        working-directory: ${{ matrix.working_directory }}
        continue-on-error: true
        run: |
          terraform plan -no-color -input=false -lock-timeout=60s | tee plan_output.txt

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = `${{ matrix.working_directory }}/plan_output.txt`;
            let output = '(no output captured)';
            try {
              output = fs.readFileSync(path, 'utf8');
            } catch (e) {}

            if (output.length > 60000) {
              output = output.slice(0, 60000) + '\n... (truncated, see full logs in Actions run)';
            }

            const marker = `<!-- terraform-plan-account:${{ matrix.account }} -->`;
            const status = '${{ steps.plan.outcome }}' === 'success' ? 'âś…' : 'âťŚ';
            const body = `${marker}\n### ${status} Terraform Plan â€” \`${{ matrix.account }}\`\n\n<details><summary>Show plan output</summary>\n\n\`\`\`\n${output}\n\`\`\`\n</details>`;
           
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
           
            const existing = comments.find(c => c.body.includes(marker));
            
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail job if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1
name: Generate Terraform Docs

on:
  pull_request:
    branches: [main]
    paths:
      - 'member-accounts/**/*.tf'
      - 'member-accounts/**/*.tfvars'
      - 'modules/**/*.tf'
  push:
    branches: [main]
    paths:
      - 'member-accounts/**/*.tf'
      - 'member-accounts/**/*.tfvars'
      - 'modules/**/*.tf'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-docs:
    name: Generate and Update README
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Render terraform docs and push changes back
        uses: terraform-docs/gh-actions@v1
        with:
          # List each account folder explicitly
          working-dir: >
            member-accounts/development,
            member-accounts/monitoring,
            member-accounts/network,
            member-accounts/production,
            member-accounts/security,
            member-accounts/security_analytics
          output-file: README.md
          output-method: inject
          git-push: "true"
          git-commit-message: "docs: auto-generate Terraform documentation [skip ci]"
# .github/workflows/notify-slack.yaml
name: Slack Notifications

on:
  workflow_run:
    workflows: ["Terraform Plan", "Terraform Apply"]
    types:
      - completed

jobs:
  notify:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion != 'skipped' }}
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "${{ github.event.workflow_run.conclusion == 'success' && '✅' || '❌' }} ${{ github.event.workflow_run.name }} - ${{ github.repository }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*${{ github.event.workflow_run.conclusion == 'success' && '✅' || '❌' }}* ${{ github.event.workflow_run.name }} completed\n*Repository:* ${{ github.repository }}\n*Run ID:* <${{ github.event.workflow_run.html_url }}|View Logs>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}